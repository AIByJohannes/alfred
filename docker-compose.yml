version: '3.8'

services:
  # ===================================
  # AI Service (FastAPI)
  # ===================================
  ai-service:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: alfred-ai-service
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
    env_file:
      - ./core/.env
    volumes:
      - ./core:/app
      - /app/__pycache__
      - /app/.pytest_cache
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - alfred-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===================================
  # Core Service (Spring Boot)
  # ===================================
  core-service:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: alfred-core-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    env_file:
      - ./app/.env
    depends_on:
      - postgres
    networks:
      - alfred-network

  # ===================================
  # Frontend (Next.js)
  # ===================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alfred-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    networks:
      - alfred-network
    depends_on:
      - core-service

  # ===================================
  # PostgreSQL
  # ===================================
  postgres:
    image: postgres:16-alpine
    container_name: alfred-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: alfred
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alfred-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d alfred"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================
  # Alfred CLI Worker (long-lived)
  # ===================================
  # Polls Postgres for queued jobs and executes them
  # against locally mounted repos.
  # Scale up: docker compose up --scale alfred-worker=N
  alfred-worker:
    build:
      context: ../alfred-cli
      dockerfile: Dockerfile
    command: alfred worker
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/alfred
      - POLL_INTERVAL_MS=2000
      - HEARTBEAT_INTERVAL_MS=15000
      - LEASE_DURATION_SECS=60
    volumes:
      # Mount your local repos read-write so the worker can edit files
      - ${REPOS_PATH:-/repos}:/repos:rw
    networks:
      - alfred-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  alfred-network:
    driver: bridge

volumes:
  postgres-data:
